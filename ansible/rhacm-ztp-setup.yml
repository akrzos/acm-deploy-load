---
# Playbook to setup ZTP for RHACM
#
# Example Usage:
#
# Default (4.20+, telco-reference):
# time ansible-playbook -i ansible/inventory/cloud30.local ansible/rhacm-ztp-setup.yml
#
# For 4.19 and earlier (cnf-features-deploy):
# time ansible-playbook -i ansible/inventory/cloud30.local ansible/rhacm-ztp-setup.yml -e ztp_repo_type=cnf-features-deploy
#

- name: Setup RHACM ZTP
  hosts: bastion
  vars_files:
  - vars/all.yml
  roles:
  - rhacm-ztp-setup
  - role: telco-core-ztp
    when: setup_core_ztp
  - role: telco-ran-du-ztp
    when: setup_ran_du_ztp
