- name: Get the automation controller admin password
  shell: |
    KUBECONFIG={{ hub_cluster_kubeconfig }} oc get secret -n ansible-automation-platform {{ aap_automationcontroller_name }}-admin-password -o jsonpath='{.data.password}' | base64 -d
  register: get_automationcontroller_admin_pw

- name: Get the automation controller route
  shell: |
    KUBECONFIG={{ hub_cluster_kubeconfig }} oc -n ansible-automation-platform get route {{ aap_automationcontroller_name }} -o jsonpath='{.spec.host}'
  register: automationcontroller_route

