---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-common-and-group
  namespace: openshift-gitops
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: ztp-site
  project: policy-app-project
  source:
    path: {{ ztp_argocd_base_path }}/policy/common-and-group
    repoURL: http://{{ gogs_username }}:{{ gogs_password }}@{{ gogs_host }}:{{ gogs_port }}/testadmin/{{ ztp_repo_name }}.git
    targetRevision: {{ ztp_repo_branch }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
