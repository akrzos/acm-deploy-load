---
# rhacm-ztp-setup default vars

# Repository type: "cnf-features-deploy" (pre-4.21) or "telco-reference" (4.21+)
ztp_repo_type: "cnf-features-deploy"

# Repository settings for cnf-features-deploy (pre-4.21)
cnf_features_deploy_repo: https://github.com/openshift-kni/cnf-features-deploy.git
cnf_features_deploy_branch: release-4.20

# Repository settings for telco-reference (4.21+)
telco_reference_repo: https://github.com/openshift-kni/telco-reference.git
telco_reference_branch: release-4.21

# Derived variables based on repo type
ztp_repo_name: "{{ 'telco-reference' if ztp_repo_type == 'telco-reference' else 'cnf-features-deploy' }}"
ztp_repo_url: "{{ telco_reference_repo if ztp_repo_type == 'telco-reference' else cnf_features_deploy_repo }}"
ztp_repo_branch: "{{ telco_reference_branch if ztp_repo_type == 'telco-reference' else cnf_features_deploy_branch }}"
ztp_argocd_base_path: "{{ 'telco-ran/configuration/argocd' if ztp_repo_type == 'telco-reference' else 'ztp/gitops-subscriptions/argocd' }}"

# Gogs service to commit repo to
gogs_host: "[fc00:1000::1]"
gogs_port: 10880
gogs_username: testadmin
gogs_password: testadmin

# The ztp-site-generator container image tag
ztp_site_generator_image_tag: "{{ 'v4.21.0-1' if ztp_repo_type == 'telco-reference' else 'v4.20.0-1' }}"

# RHACM Policy Generator Tag
rhacm_policy_generator_image_tag: v2.13.4-2

# Append ManagedClusterAddOn to namespaceResourceWhitelist in app-project.yaml (Used to enable Gitops to create/manage ManagedClusterAddOn CRs)
# This allows a ManagedClusterAddOn CR to be created for each managed cluster via Gitops which will apply the tuning in the AddOnDeploymentConfig
# Only applicable for cnf-features-deploy
append_managedclusteraddons_app_project: true
